<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Smart CRM — Подключение</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f1c2e 0%, #1e3a5f 50%, #2a5a8f 100%);
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 48px 40px;
      width: 460px;
      text-align: center;
      -webkit-app-region: no-drag;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
    label { display: block; text-align: left; font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a90d9; }
    input::placeholder { color: rgba(255,255,255,0.35); }
    .hint { text-align: left; font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 6px; margin-bottom: 24px; }
    button {
      width: 100%;
      padding: 13px;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #1d4ed8; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #374151; cursor: not-allowed; opacity: 0.6; }
    .status {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      transition: color 0.2s;
    }
    .status.ok { color: #34d399; }
    .status.err { color: #f87171; }
    .status.wait { color: #fbbf24; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✈️</div>
    <h1>Global Smart CRM</h1>
    <p class="subtitle">Финансовая CRM для авиазапчастей</p>

    <label for="url">Адрес сервера</label>
    <input type="text" id="url" placeholder="http://192.168.1.100:3001" autofocus />
    <p class="hint">Адрес компьютера, на котором запущен сервер CRM</p>

    <button id="btn" onclick="connect()">Подключиться</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const urlInput = document.getElementById("url");
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    urlInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") connect();
    });

    async function connect() {
      let url = urlInput.value.trim();
      if (!url) { show("Введите адрес сервера", "err"); return; }
      if (!url.startsWith("http")) url = "http://" + url;

      btn.disabled = true;
      show('<span class="spinner"></span>Проверка подключения...', "wait");

      const result = await window.electronAPI.testConnection(url);

      if (result.ok) {
        show("Подключено! Загрузка CRM...", "ok");
        await window.electronAPI.saveServerUrl(url);
      } else {
        show("Не удалось подключиться: " + result.error, "err");
        btn.disabled = false;
      }
    }

    function show(msg, cls) {
      status.innerHTML = msg;
      status.className = "status " + cls;
    }
  </script>
</body>
</html>
